[project]
name = global_ncp_base_ha
global_work_dir = ./workdir_base_ha
global_output_dir = ./output_base_ha
log_level = INFO

[job:country]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = nev_name
operations = mean,sum,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years_ha/*.tif

[job:region_wb]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = region_wb
operations = mean,sum,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years_ha/*.tif

[job:income_grp]
agg_vector = data/vector_basedata/cartographic_ee_r264_correspondence.gpkg
agg_field = income_grp
operations = mean,sum,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years_ha/*.tif

[job:biome]
agg_vector = data/vector_basedata/Biome.gpkg
agg_field = WWF_biome
operations = mean,sum,stdev,valid_count,total_count
row_col_order = agg_field,base_raster
base_raster_pattern = data/base_years_ha/*.tif