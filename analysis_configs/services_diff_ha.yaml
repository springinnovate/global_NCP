# Services difference extraction (1992-2020), per-hectare corrected.
# Uses canonical land grid and GLOBAL_NCP_DATA for portability.
# Corresponds to "Path C" in the methodology (Aggregate of Differences).

workspace_dir:
  path: "./summary_pipeline_workspace_diff_ha"

vector_zones:
  grid_10km_land:
    path: "${GLOBAL_NCP_DATA}/vector_basedata/AOOGrid_10x10km_land_4326_clean.gpkg"

raster_layers:
  # Note: Filenames are assumed based on standard difference naming.
  # Filenames have been corrected to match the contents of the directory.

  nature_access_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/nature_access_diff_1992_2020.tif"
    band: 1

  n_ret_ratio_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_retention_ratio_diff_1992_2020.tif"
    band: 1

  sed_ret_ratio_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/sed_retention_ratio_diff_1992_2020.tif"
    band: 1

  n_export_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_export_diff_1992_2020.tif"
    band: 1

  n_retention_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_retention_diff_1992_2020.tif"
    band: 1

  sed_export_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/sed_export_diff_1992_2020.tif"
    band: 1

  realized_pollination_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/realized_pollination_on_ag_1992_2020_diff.tif"
    band: 1

op_stats:
  - mean
  - sum
  - stdev
  - min
  - max