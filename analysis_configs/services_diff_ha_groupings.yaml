# Services difference extraction (1992-2020) by regional groupings.
# Uses regional vectors instead of the 10km grid.

workspace_dir:
  path: "./summary_pipeline_workspace_diff_ha_groupings"

vector_zones:
  cartographic_regions:
    path: "${GLOBAL_NCP_DATA}/vector_basedata/cartographic_ee_r264_correspondence.gpkg"
  biomes:
    path: "${GLOBAL_NCP_DATA}/vector_basedata/Biome.gpkg"

raster_layers:
  nature_access_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/nature_access_diff_1992_2020.tif"
    band: 1

  n_ret_ratio_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_retention_ratio_diff_1992_2020.tif"
    band: 1

  sed_ret_ratio_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/sed_retention_ratio_diff_1992_2020.tif"
    band: 1

  n_export_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_export_diff_1992_2020.tif"
    band: 1

  n_retention_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/n_retention_diff_1992_2020.tif"
    band: 1

  sed_export_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/sed_export_diff_1992_2020.tif"
    band: 1

  realized_pollination_diff:
    path: "${GLOBAL_NCP_DATA}/2020_1992_ch_ha/realized_pollination_on_ag_1992_2020_diff.tif"
    band: 1

op_stats:
  - mean
  - sum